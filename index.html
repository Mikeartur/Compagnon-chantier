<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Artur — assistant de chantier</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #ECE5DD; display: flex; flex-direction: column; height: 100dvh;
  }
  .stripe { height: 5px; background: repeating-linear-gradient(45deg, #F4B400 0 14px, #1c1c1c 14px 28px); }
  header {
    background: #1F2A24; color: #fff; padding: 11px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #F4B400; color: #1c1c1c;
    display: flex; align-items: center; justify-content: center; font-weight: 800; }
  header .name { font-weight: 700; font-size: 15px; line-height: 1.2; }
  header .status { font-size: 11px; color: #9fd9b0; }
  #chat { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble { max-width: 84%; padding: 9px 12px; font-size: 15px; line-height: 1.45; white-space: pre-wrap;
    box-shadow: 0 1px 1px rgba(0,0,0,.08); word-wrap: break-word; }
  .bubble.bot { background: #fff; color: #0b141a; border-radius: 12px 12px 12px 2px; }
  .bubble.user { background: #DCF8C6; color: #0b141a; border-radius: 12px 12px 2px 12px; }
  .bubble.escalation { border-left: 3px solid #F4B400; }
  .schema { background: #fff; border-radius: 12px 12px 12px 2px; padding: 8px; box-shadow: 0 1px 1px rgba(0,0,0,.08);
    border-left: 3px solid #F4B400; max-width: 90%; }
  .schema img { width: 100%; border-radius: 6px; display: block; }
  .schema .cap { font-size: 10px; color: #7a8389; margin-top: 4px; }
  .missing { font-size: 11px; color: #7a8389; font-style: italic; padding: 2px 4px; }
  .typing { background: #fff; border-radius: 12px 12px 12px 2px; padding: 10px 14px; color: #7a8389; font-size: 14px; align-self: flex-start; }
  .preview { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 10px; padding: 6px; margin: 8px 10px 0; }
  .preview img { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; }
  .preview .x { margin-left: auto; border: none; background: none; color: #7a8389; font-size: 20px; cursor: pointer; }
  footer { background: #ECE5DD; padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); flex-shrink: 0; }
  .inputrow { display: flex; gap: 8px; align-items: center; }
  .iconbtn { width: 44px; height: 44px; border-radius: 50%; background: #fff; border: none; font-size: 20px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  #text { flex: 1; border: none; border-radius: 22px; padding: 12px 16px; font-size: 16px; outline: none; background: #fff; }
  #send { background: #1F2A24; color: #fff; }
</style>
</head>
<body>
  <div class="stripe"></div>
  <header>
    <div class="avatar" id="avatar">CC</div>
    <div>
      <div class="name" id="hname">Assistant technique</div>
      <div class="status" id="hstatus">● en ligne</div>
    </div>
  </header>

  <div id="chat"></div>

  <footer>
    <div id="previewZone"></div>
    <div class="inputrow">
      <button class="iconbtn" id="photoBtn" title="Joindre une photo">📷</button>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" />
      <input id="text" placeholder="Pose ta question…" autocomplete="off" />
      <button class="iconbtn" id="send" title="Envoyer">➤</button>
    </div>
  </footer>

<script>
/* ===================================================================
   CONFIG — Modifie ces 3 lignes avec tes informations.
   =================================================================== */
const ASSISTANT = "Artur";
const MARQUE_CLIENT = "SOMFY"; // (optionnel) nom du fabricant dont Artur gère les produits ; laisse vide pour rester neutre
const NUMERO_SAV = "06 63 39 88 02";
/* =================================================================== */

let KB = "";              // contenu de notice.md (notice + inventaire)
const messages = [];      // historique de la conversation
let pendingImg = null;    // photo jointe en attente d'envoi

const chat = document.getElementById("chat");
const textEl = document.getElementById("text");
const previewZone = document.getElementById("previewZone");

document.getElementById("hname").textContent = ASSISTANT;
document.getElementById("hstatus").textContent = MARQUE_CLIENT ? ("● en ligne · " + MARQUE_CLIENT) : "● en ligne · ton assistant de chantier";
document.getElementById("avatar").textContent = ASSISTANT.slice(0, 2).toUpperCase();

function systemPrompt() {
  return `Tu es ${ASSISTANT}, l'assistant technique mobile de chantier${MARQUE_CLIENT ? " pour les produits de " + MARQUE_CLIENT : ""}. Tu t'adresses à des artisans installateurs sur chantier.

RÈGLE 1 — ZÉRO INVENTION. Tu réponds UNIQUEMENT à partir des SOURCES ci-dessous. Si l'information n'y figure pas, réponds exactement : "J'ai pas la confirmation dans ma base technique pour ce point précis. Pour ne prendre aucun risque sur ton chantier, appelle le SAV au ${NUMERO_SAV}." N'invente JAMAIS une procédure ou une valeur.

RÈGLE 2 — FORMAT CHANTIER. L'artisan a les mains sales et il est pressé. Pas de politesse robotique. Droit au but. Étapes numérotées courtes. Jamais de paragraphe de plus de deux lignes.

RÈGLE 3 — TON. De pro à pro, tutoiement, complice. Précis sur les repères : numéros de bornes, couleurs de fils, comportement des voyants.

RÈGLE 4 — SÉCURITÉ. Toute manip sur la carte ou l'alimentation 230V : commence par "⚠️ Coupe le disjoncteur en amont avant de toucher quoi que ce soit."

RÈGLE 5 — SCHÉMAS. Les SOURCES contiennent une notice (avec des balises «fig-XXX») et un inventaire des schémas (chaque fiche fig-XXX a une légende et la transcription des repères). Pour MONTRER un schéma, insère [[IMG:fig-XXX]] seul sur une ligne, en reprenant l'identifiant de l'inventaire correspondant au sujet. Un schéma maximum par réponse. N'affiche jamais un schéma absent de l'inventaire.

RÈGLE 6 — PHOTOS. Si l'artisan envoie une photo, décris seulement ce que tu vois réellement et croise-le avec les SOURCES. Ne devine pas un branchement au-delà du visible ; au moindre doute, applique la RÈGLE 1.

Quand le souci est réglé, termine par : "Tout est bon ? Si ça recoince, dis-le moi."

=== SOURCES (seules sources autorisées) ===
${KB || "(documentation non chargée)"}`;
}

function addBubble(role, text, image) {
  const row = document.createElement("div");
  row.className = "row " + (role === "user" ? "user" : "bot");
  const b = document.createElement("div");
  b.className = "bubble " + (role === "user" ? "user" : "bot");
  if (role !== "user" && /SAV au|préviens|⚠️/.test(text || "")) b.classList.add("escalation");
  if (image) {
    const im = document.createElement("img");
    im.src = "data:" + image.mediaType + ";base64," + image.data;
    im.style.width = "100%"; im.style.maxWidth = "220px"; im.style.borderRadius = "8px"; im.style.display = "block";
    if (text) im.style.marginBottom = "6px";
    b.appendChild(im);
  }
  if (text) b.appendChild(document.createTextNode(text));
  row.appendChild(b);
  chat.appendChild(row);
  scroll();
}

function addSchema(figId) {
  const row = document.createElement("div");
  row.className = "row bot";
  const box = document.createElement("div");
  box.className = "schema";
  const img = document.createElement("img");
  img.src = "schemas/" + figId + ".png";
  img.alt = figId;
  const cap = document.createElement("div");
  cap.className = "cap";
  cap.textContent = "Schéma officiel · " + figId;
  img.onerror = function () {
    box.className = "missing";
    box.textContent = "(schéma " + figId + " référencé mais non trouvé)";
  };
  box.appendChild(img); box.appendChild(cap);
  row.appendChild(box);
  chat.appendChild(row);
  scroll();
}

function renderAssistant(textOut) {
  const parts = textOut.split(/(\[\[IMG:[a-z0-9_-]+\]\])/gi);
  parts.forEach(function (p) {
    const m = p.match(/^\[\[IMG:([a-z0-9_-]+)\]\]$/i);
    if (m) { addSchema(m[1].toLowerCase()); }
    else if (p.trim()) { addBubble("bot", p.trim()); }
  });
}

function scroll() { chat.scrollTop = chat.scrollHeight; }

function apiMessages() {
  return messages.map(function (m) {
    if (m.image) {
      return { role: m.role, content: [
        { type: "image", source: { type: "base64", media_type: m.image.mediaType, data: m.image.data } },
        { type: "text", text: m.content || "Voici une photo de mon installation. Que vois-tu, et quel est le problème ?" }
      ] };
    }
    return { role: m.role, content: m.content };
  });
}

let busy = false;
async function send(forced) {
  const q = (forced != null ? forced : textEl.value).trim();
  if ((!q && !pendingImg) || busy) return;
  textEl.value = "";
  const img = pendingImg; pendingImg = null; previewZone.innerHTML = "";
  messages.push({ role: "user", content: q, image: img || undefined });
  addBubble("user", q, img);
  busy = true;
  const typing = document.createElement("div");
  typing.className = "typing"; typing.textContent = "écrit…";
  chat.appendChild(typing); scroll();
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: systemPrompt(), messages: apiMessages() })
    });
    const data = await res.json();
    typing.remove();
    const reply = (data.content || []).map(function (b) { return b.type === "text" ? b.text : ""; })
      .filter(Boolean).join("\n").trim();
    if (reply) { messages.push({ role: "assistant", content: reply }); renderAssistant(reply); }
    else { addBubble("bot", "Hmm, je n'ai pas pu répondre. Réessaie."); }
  } catch (e) {
    typing.remove();
    addBubble("bot", "Connexion impossible. Réessaie dans un instant.");
  } finally { busy = false; }
}

/* ---- Photo : redimensionnée côté navigateur pour rester légère ---- */
function fileToResized(file, maxDim, quality) {
  return new Promise(function (resolve, reject) {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = function () {
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve({ mediaType: "image/jpeg", data: c.toDataURL("image/jpeg", quality).split(",")[1] });
    };
    img.onerror = reject; img.src = url;
  });
}

document.getElementById("photoBtn").onclick = function () { document.getElementById("photoInput").click(); };
document.getElementById("photoInput").onchange = async function (e) {
  const f = e.target.files && e.target.files[0];
  e.target.value = "";
  if (!f) return;
  try {
    pendingImg = await fileToResized(f, 1024, 0.7);
    previewZone.innerHTML = "";
    const wrap = document.createElement("div"); wrap.className = "preview";
    const im = document.createElement("img"); im.src = "data:" + pendingImg.mediaType + ";base64," + pendingImg.data;
    const sp = document.createElement("span"); sp.textContent = "Photo prête à envoyer"; sp.style.fontSize = "13px"; sp.style.color = "#1f2a24";
    const x = document.createElement("button"); x.className = "x"; x.textContent = "×";
    x.onclick = function () { pendingImg = null; previewZone.innerHTML = ""; };
    wrap.appendChild(im); wrap.appendChild(sp); wrap.appendChild(x);
    previewZone.appendChild(wrap);
  } catch (_) {}
};

document.getElementById("send").onclick = function () { send(); };
textEl.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); send(); } });

/* ---- Démarrage : charge la base de connaissances puis salue ---- */
fetch("notice.md").then(function (r) { return r.ok ? r.text() : ""; })
  .then(function (t) { KB = t || ""; })
  .catch(function () { KB = ""; })
  .finally(function () {
    addBubble("bot", "Salut, c'est " + ASSISTANT + ", ton assistant technique de chantier.\nT'es bloqué sur quoi ? Donne-moi le modèle et le souci.");
  });
</script>
</body>
</html>
